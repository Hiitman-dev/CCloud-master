name: Build CCloud

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Validate Gradle Wrapper
        run: ./scripts/verify-gradle-wrapper.sh
        continue-on-error: true
        timeout-minutes: 5

      - name: Check and fix Gradle Wrapper if needed
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar.sha256" ]; then
            echo "Gradle wrapper checksum missing, generating new one..."
            ./scripts/fix-gradle-wrapper.sh
          fi
        continue-on-error: true

      - name: Ensure Gradle Wrapper Checksum
        run: |
          cd gradle/wrapper
          if [ ! -f "gradle-wrapper.jar.sha256" ]; then
            sha256sum gradle-wrapper.jar > gradle-wrapper.jar.sha256
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Clean build
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace -x lint

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CCloud-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        run: echo "${{ secrets.KEY_STORE }}" | base64 --decode > app/keystore.jks
        continue-on-error: true

      - name: Create keystore properties file
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
          echo "storeFile=keystore.jks" >> key.properties
        continue-on-error: true

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace -x lint

      - name: Get tag name
        id: get_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/*.apk
          body: |
            ## CCloud Release ${{ env.TAG_NAME }}

            ### What's New
            - Modernized UI with enhanced user experience
            - Improved performance and stability
            - New features and bug fixes
